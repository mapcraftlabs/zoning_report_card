name: Keep App Warm
on:
  schedule:
    - cron: '0 0 * * *' # Once a day
jobs:
  keep_warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push empty commit
        run: |
          git config --global user.name "warmup-bot"
          git config --global user.email "bot@example.com"
          git commit --allow-empty -m "Keep-warm ping"
          git push
